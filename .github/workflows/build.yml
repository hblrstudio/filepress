name: Build & Release

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.app + .dmg)
    runs-on: macos-14       # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install customtkinter pillow pikepdf tkinterdnd2 pyinstaller

      - name: Generate icon
        run: python scripts/make_icon.py

      - name: Build .app
        run: pyinstaller FilePress.spec --noconfirm

      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - dist/FilePress.app
          sleep 3

      - name: Build DMG
        run: |
          APP="dist/FilePress.app"
          TMP="dist/dmg_tmp"
          mkdir -p "$TMP"
          ditto "$APP" "$TMP/FilePress.app"
          ln -s /Applications "$TMP/Applications"
          sync
          hdiutil create \
            -volname "FilePress" \
            -srcfolder "$TMP" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            dist/FilePress.dmg
          rm -rf "$TMP"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilePress-macOS
          path: dist/FilePress.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install customtkinter pillow pikepdf tkinterdnd2 pyinstaller

      - name: Build .exe
        run: pyinstaller --noconfirm --onefile --windowed --name FilePress --icon assets/FilePress.icns main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilePress-Windows
          path: dist/FilePress.exe

  # ── Publish: Vercel Blob + version.json ────────────────────────────────────
  publish:
    name: Upload to Vercel Blob & update version.json
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write   # needed to commit version.json back

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FilePress-macOS
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FilePress-Windows
          path: ./artifacts

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install @vercel/blob
        run: npm install @vercel/blob

      - name: Upload files to Vercel Blob & write version.json
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: node scripts/upload-release.mjs

      - name: Commit updated version.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/version.json
          git commit -m "chore: update version.json for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main
