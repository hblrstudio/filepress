name: Build & Release

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.app + .dmg)
    runs-on: macos-14       # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install customtkinter pillow pikepdf tkinterdnd2 pyinstaller

      - name: Generate icon
        run: python scripts/make_icon.py

      - name: Build .app
        run: pyinstaller FilePress.spec --noconfirm

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - dist/FilePress.app

      - name: Build DMG
        run: |
          APP="dist/FilePress.app"
          TMP="dist/dmg_tmp"
          mkdir -p "$TMP"
          cp -r "$APP" "$TMP/"
          ln -s /Applications "$TMP/Applications"
          hdiutil create \
            -volname "FilePress" \
            -srcfolder "$TMP" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            dist/FilePress.dmg
          rm -rf "$TMP"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilePress-macOS
          path: dist/FilePress.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install customtkinter pillow pikepdf tkinterdnd2 pyinstaller

      - name: Build .exe
        run: pyinstaller --noconfirm --onefile --windowed --name FilePress --icon assets/FilePress.icns main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilePress-Windows
          path: dist/FilePress.exe

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FilePress-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FilePress-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FilePress ${{ github.ref_name }}
          body: |
            ## FilePress ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon + Intel) | `FilePress.dmg` |
            | Windows | `FilePress.exe` |

            ### macOS install
            1. Open `FilePress.dmg`
            2. Drag FilePress to Applications
            3. First launch: right-click → Open (one-time Gatekeeper bypass)

            ### Windows install
            1. Download `FilePress.exe`
            2. If SmartScreen appears: click "More info" → "Run anyway"
          files: |
            FilePress.dmg
            FilePress.exe
          draft: false
          prerelease: false
